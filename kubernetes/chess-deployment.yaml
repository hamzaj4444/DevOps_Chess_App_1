apiVersion: apps/v1
kind: Deployment
metadata:
  name: chess-app
  labels:
    app: chess-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chess-app
  template:
    metadata:
      labels:
        app: chess-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: chess-app
          image: hamzaj4444/devops-chess-app:latest
          ports:
            - containerPort: 8000
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: chess-secrets
                  key: jwt-secret
          resources:
            limits:
              cpu: "1000m"
              memory: "2Gi"
            requests:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /chess/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: chess-service
spec:
  selector:
    app: chess-app
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
