apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
data:
  config.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki-service:3100/loki/api/v1/push

    scrape_configs:
      - job_name: docker
        docker_sd_configs:
          - host: unix:///var/run/docker.sock
            refresh_interval: 5s
        relabel_configs:
          - source_labels: ["__meta_docker_container_name"]
            regex: "/k8s_([^_]+)_.*"
            target_label: "container"
          - source_labels: ["__meta_docker_container_log_stream"]
            target_label: "stream"
        pipeline_stages:
          - docker: {}

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  labels:
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      containers:
        - name: promtail
          image: grafana/promtail:latest
          volumeMounts:
            - name: docker-sock
              mountPath: /var/run/docker.sock
              readOnly: true
            - name: config-volume
              mountPath: /etc/promtail/config.yaml
              subPath: config.yaml
          args:
            - "-config.file=/etc/promtail/config.yaml"
      volumes:
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
        - name: config-volume
          configMap:
            name: promtail-config
